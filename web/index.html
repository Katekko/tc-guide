<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Structured Twilight Chronicle community guides.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TC Guides">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Twilight Chronicle Guides</title>
  <link rel="manifest" href="manifest.json">

  <!-- Match the app's dark page background so there is no white flash before
       Flutter paints its first frame, and show a themed loading spinner. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #070b16;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #070b16;
      transition: opacity 0.35s ease;
      z-index: 0;
    }
    #loading.loaded {
      opacity: 0;
      pointer-events: none;
    }
    #loading .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(244, 247, 251, 0.15);
      border-top-color: #6ea8ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Static loader shown immediately; removed once Flutter's view mounts. -->
  <div id="loading"><div class="spinner"></div></div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!--
    Fade out and remove the loader as soon as Flutter mounts its view, so the
    spinner covers the whole boot/compile window then hands off cleanly.
  -->
  <script>
    (function () {
      var loader = document.getElementById('loading');
      if (!loader) return;
      function dismiss() {
        loader.classList.add('loaded');
        setTimeout(function () { loader.remove(); }, 400);
      }
      var observer = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane, flt-scene-host')) {
          observer.disconnect();
          dismiss();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
