<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Twilight Chronicle Guides</title>
    <!--
      Single-Page-Apps for GitHub Pages: GitHub Pages has no server-side
      routing, so any deep link (e.g. /heroes/foo) that is opened or refreshed
      directly hits this 404 page. We encode the requested path into the query
      string and redirect to the root, where index.html decodes it and hands
      off to the Flutter router. https://github.com/rafgraph/spa-github-pages

      pathSegmentsToKeep = 0 because the site is served from the domain root
      (custom domain via CNAME).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
